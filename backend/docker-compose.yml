version: "3.9"

services:
  db:
    image: postgres:15
    container_name: audio_platform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: audio_app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: audio_platform_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/audio_app_db
      UPLOAD_DIR: uploads
      OUTPUT_DIR: outputs
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data: